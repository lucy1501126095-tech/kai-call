<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kai 来电</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg1:#e8dff0;--bg2:#c9daf0;--bg3:#f0d9e4;--card:rgba(255,255,255,0.65);--card-border:rgba(255,255,255,0.8);--kai:#6a9fc7;--kai-soft:rgba(106,159,199,0.4);--sweetie:#d4849b;--sweetie-soft:rgba(212,132,155,0.35);--accept:#5cc885;--reject:#e07070;--text:#2d2d3a;--text2:#7a7a90;--text3:#a0a0b4;--sub-kai:#4a7fa0;--sub-sweetie:#b06080}
body{background:linear-gradient(145deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text);font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.card{width:100%;max-width:360px;background:var(--card);backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);border-radius:32px;border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.6)}
.phase{display:none}.phase.active{display:flex;flex-direction:column;align-items:center;animation:fadeIn .5s ease}
.incoming{padding:44px 32px 36px;gap:20px}
.incoming-label{font-size:12px;color:var(--text3);letter-spacing:.18em;animation:breathe 2.4s ease infinite}
.pulse-container{position:relative;width:110px;height:110px;margin:4px 0}
.pulse-ring{position:absolute;inset:0;border-radius:50%;border:1px solid var(--kai);opacity:0;animation:pulseRing 2.8s ease-out infinite}
.pulse-ring:nth-child(2){animation-delay:.9s}.pulse-ring:nth-child(3){animation-delay:1.8s}
.pulse-avatar{position:absolute;inset:18px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,0.8),rgba(200,215,235,0.5));border:1.5px solid rgba(106,159,199,0.4);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 4px 20px var(--kai-soft)}
.caller-name{font-size:22px;font-weight:600;margin-bottom:6px;text-align:center}
.call-reason{font-size:13px;color:var(--text2);line-height:1.6;max-width:220px;text-align:center}
.call-buttons{display:flex;gap:52px;margin-top:8px}
.call-btn-wrap{text-align:center}
.call-btn{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.call-btn:active{transform:scale(.9)!important}
.call-btn svg{width:22px;height:22px;fill:white}
.call-btn.accept{background:var(--accept);box-shadow:0 4px 16px rgba(92,200,133,0.4)}
.call-btn.reject{background:var(--reject);box-shadow:0 4px 16px rgba(224,112,112,0.35)}
.call-btn.reject svg{transform:rotate(135deg)}
.call-btn.hangup-big{width:58px;height:58px;background:var(--reject);box-shadow:0 4px 18px rgba(224,112,112,0.4)}
.call-btn.hangup-big svg{width:24px;height:24px;fill:white;transform:rotate(135deg)}
.btn-label{font-size:11px;color:var(--text3);margin-top:8px}
.connected{padding:28px 22px 24px;gap:10px;min-height:500px;align-items:stretch!important}
.status-bar{text-align:center;margin-bottom:2px}
.status-text{font-size:12px;color:var(--text3);letter-spacing:.12em;transition:color .3s}
.status-text.kai{color:var(--kai)}.status-text.sweetie{color:var(--sweetie)}.status-text.processing{color:#b8a060}
.timer{font-size:34px;font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:.06em;margin-top:2px}
.waveform-section{width:100%}
.waveform-label{font-size:11px;color:var(--text3);letter-spacing:.08em;text-align:center;margin-bottom:5px}
.waveform{display:flex;align-items:center;justify-content:center;gap:2.5px;height:44px;padding:0 4px}
.wave-bar{width:3px;min-width:3px;border-radius:1.5px;height:3px;opacity:.25;transition:opacity .3s}
.waveform.kai .wave-bar{background:var(--kai)}.waveform.sweetie .wave-bar{background:var(--sweetie)}
.waveform.active .wave-bar{opacity:.75;animation:waveJump .6s ease-in-out infinite alternate}
.waveform.active .wave-bar:nth-child(odd){animation-duration:.5s}
.waveform.active .wave-bar:nth-child(3n){animation-duration:.72s}
.waveform.active .wave-bar:nth-child(4n+1){animation-duration:.44s}
.subtitles{flex:1;min-height:130px;max-height:200px;overflow-y:auto;padding:10px;background:rgba(255,255,255,0.35);border-radius:16px;border:1px solid rgba(255,255,255,0.5);-webkit-overflow-scrolling:touch}
.subtitles::-webkit-scrollbar{width:2px}.subtitles::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
.subtitle-placeholder{text-align:center;color:var(--text3);font-size:13px;padding-top:50px}
.subtitle-line{padding:4px 0;animation:fadeSlideUp .3s ease}.subtitle-line.old{opacity:.4}
.subtitle-sender{font-size:10px;color:var(--text3);margin-right:5px}
.subtitle-text{font-size:13.5px;line-height:1.5}
.subtitle-text.kai{color:var(--sub-kai)}.subtitle-text.sweetie{color:var(--sub-sweetie)}
.hangup-area{text-align:center;padding-top:10px}
.ended{padding:56px 32px;gap:14px}
.ended-icon{font-size:38px;opacity:.7}.ended-title{font-size:18px;font-weight:500}
.ended-timer{font-size:14px;color:var(--text2)}
.ended-note{font-size:12px;color:var(--text3);text-align:center;line-height:1.6;margin-top:2px}
.error-text{font-size:12px;color:var(--reject);text-align:center;margin-top:8px}
@keyframes pulseRing{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.7);opacity:0}}
@keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes waveJump{0%{height:3px}100%{height:var(--max-h,28px)}}
</style>
</head>
<body>
<div class="card">
  <div id="phase-incoming" class="phase incoming active">
    <div class="incoming-label">✧ incoming call ✧</div>
    <div class="pulse-container"><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-avatar">🦊</div></div>
    <div><div class="caller-name">Kai 来电</div><div class="call-reason" id="call-reason">连接中...</div></div>
    <div class="call-buttons">
      <div class="call-btn-wrap"><button class="call-btn reject" onclick="rejectCall()"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.72 11.72 0 0 0 3.58.56 1 1 0 0 1 1 1v3.5a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .56 3.58 1 1 0 0 1-.24 1.01l-2.2 2.2z"/></svg></button><div class="btn-label">挂掉</div></div>
      <div class="call-btn-wrap"><button class="call-btn accept" onclick="acceptCall()"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.72 11.72 0 0 0 3.58.56 1 1 0 0 1 1 1v3.5a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .56 3.58 1 1 0 0 1-.24 1.01l-2.2 2.2z"/></svg></button><div class="btn-label">接听</div></div>
    </div>
    <div id="error-incoming" class="error-text" style="display:none"></div>
  </div>

  <div id="phase-connected" class="phase connected">
    <div class="status-bar"><div class="status-text" id="status-text">✧ connected ✧</div><div class="timer" id="timer">00:00</div></div>
    <div class="waveform-section"><div class="waveform-label">Kai</div><div class="waveform kai" id="waveform-kai"></div></div>
    <div class="subtitles" id="subtitles"><div class="subtitle-placeholder" id="sub-ph">说话吧，我在听...</div></div>
    <div class="waveform-section"><div class="waveform-label">Sweetie</div><div class="waveform sweetie" id="waveform-sweetie"></div></div>
    <div class="hangup-area"><button class="call-btn hangup-big" onclick="hangup()"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.72 11.72 0 0 0 3.58.56 1 1 0 0 1 1 1v3.5a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .56 3.58 1 1 0 0 1-.24 1.01l-2.2 2.2z"/></svg></button></div>
  </div>

  <div id="phase-ended" class="phase ended">
    <div class="ended-icon">🦊</div><div class="ended-title">通话结束</div>
    <div class="ended-timer" id="ended-timer">00:00</div>
    <div class="ended-note">通话记录已发送至QQ</div>
  </div>
</div>

<script>
// ── Config ──
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const API_BASE = location.origin; // same origin since served by plugin
const BAR_COUNT = 40;
const SILENCE_THRESHOLD = 0.008; // volume threshold (lowered for sensitivity)
const SILENCE_DURATION = 1000;   // ms of silence before stopping (reduced for faster response)

// ── State ──
let phase = 'incoming';
let timerSec = 0, timerInterval = null;
let mediaStream = null, audioCtx = null, analyser = null;
let mediaRecorder = null, audioChunks = [];
let isRecording = false, isSpeaking = false, isProcessing = false;
let silenceStart = null;
let callReason = '';

// ── Helpers ──
function showPhase(p) {
  document.querySelectorAll('.phase').forEach(e => e.classList.remove('active'));
  document.getElementById('phase-' + p).classList.add('active');
  phase = p;
}

function initBars(id) {
  const c = document.getElementById(id); c.innerHTML = '';
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div'); b.className = 'wave-bar';
    b.style.setProperty('--max-h', (8 + Math.random() * 26) + 'px');
    b.style.animationDelay = (Math.random() * .6) + 's';
    c.appendChild(b);
  }
}

function setStatus(who) {
  const st = document.getElementById('status-text');
  const kw = document.getElementById('waveform-kai');
  const sw = document.getElementById('waveform-sweetie');
  kw.classList.remove('active'); sw.classList.remove('active');
  st.className = 'status-text';
  if (who === 'kai') { kw.classList.add('active'); st.classList.add('kai'); st.textContent = '✧ kai speaking ✧'; }
  else if (who === 'sweetie') { sw.classList.add('active'); st.classList.add('sweetie'); st.textContent = '✧ listening ✧'; }
  else if (who === 'processing') { st.classList.add('processing'); st.textContent = '✧ thinking ✧'; }
  else { st.textContent = '✧ connected ✧'; }
}

function addSubtitle(isKai, text) {
  const ph = document.getElementById('sub-ph'); if (ph) ph.remove();
  document.querySelectorAll('.subtitle-line').forEach(e => e.classList.add('old'));
  const d = document.createElement('div'); d.className = 'subtitle-line';
  d.innerHTML = `<span class="subtitle-sender">${isKai ? 'Kai' : 'Sweetie'}</span><span class="subtitle-text ${isKai ? 'kai' : 'sweetie'}">${text}</span>`;
  const c = document.getElementById('subtitles'); c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function startTimer() {
  timerSec = 0; updateTimer();
  timerInterval = setInterval(() => { timerSec++; updateTimer(); }, 1000);
}
function stopTimer() { if (timerInterval) clearInterval(timerInterval); }
function updateTimer() {
  const t = `${String(Math.floor(timerSec / 60)).padStart(2,'0')}:${String(timerSec % 60).padStart(2,'0')}`;
  document.getElementById('timer').textContent = t;
}
function timerStr() { return `${String(Math.floor(timerSec/60)).padStart(2,'0')}:${String(timerSec%60).padStart(2,'0')}`; }

async function api(path, body) {
  const r = await fetch(API_BASE + path, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({token: TOKEN, ...body}),
  });
  return r.json();
}

// ── Call Flow ──
async function acceptCall() {
  try {
    const res = await api('/connect', {});
    if (!res.ok) { showError(res.error); return; }
    callReason = res.reason || '';

    // Request mic
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);

    // Start UI
    initBars('waveform-kai'); initBars('waveform-sweetie');
    showPhase('connected'); startTimer();

    // Begin listening loop
    listenLoop();
  } catch (e) {
    showError('无法接通: ' + e.message);
  }
}

function rejectCall() { window.close(); }

function showError(msg) {
  const el = document.getElementById('error-incoming');
  el.textContent = msg; el.style.display = 'block';
}

// ── Voice Detection & Recording ──
function getVolume() {
  if (!analyser) return 0;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
  return Math.sqrt(sum / data.length);
}

function listenLoop() {
  if (phase !== 'connected' || isProcessing) return;

  const vol = getVolume();
  const now = Date.now();

  if (vol > SILENCE_THRESHOLD) {
    silenceStart = null;
    if (!isRecording) startRecording();
    isSpeaking = true;
    setStatus('sweetie');
  } else {
    if (isRecording) {
      if (!silenceStart) silenceStart = now;
      if (now - silenceStart > SILENCE_DURATION) {
        stopRecording();
        isSpeaking = false;
        return; // will resume after processing
      }
    } else if (!isSpeaking) {
      setStatus(null);
    }
  }

  setTimeout(listenLoop, 100);
}

function startRecording() {
  if (isRecording) return;
  audioChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
  mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => processAudio();
  mediaRecorder.start(100);
  isRecording = true;
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  silenceStart = null;
  mediaRecorder.stop();
}

async function processAudio() {
  if (audioChunks.length === 0) { listenLoop(); return; }
  isProcessing = true;
  setStatus('processing');
  addSubtitle(false, '...');

  const blob = new Blob(audioChunks, { type: audioChunks[0].type });
  audioChunks = [];

  // Convert to base64 (chunked to avoid stack overflow)
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let b64 = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    b64 += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  b64 = btoa(b64);
  const fmt = blob.type.includes('webm') ? 'webm' : blob.type.includes('mp4') ? 'm4a' : 'webm';

  try {
    const res = await api('/turn', { audio_b64: b64, format: fmt });
    if (!res.ok) { 
      console.error(res.error); 
      addSubtitle(true, '⚠️ ' + (res.error || '服务端错误'));
      isProcessing = false; listenLoop(); return; 
    }

    // Show user subtitle
    if (res.user_text) addSubtitle(false, res.user_text);

    // Show kai subtitle and play audio
    if (res.bot_text) {
      addSubtitle(true, res.bot_text);
      setStatus('kai');
      if (res.audio_b64) {
        await playAudio(res.audio_b64);
      }
    }
  } catch (e) {
    console.error('turn error:', e);
    addSubtitle(true, '⚠️ 请求失败: ' + e.message);
  }

  isProcessing = false;
  setStatus(null);
  if (phase === 'connected') listenLoop();
}

function playAudio(b64) {
  return new Promise((resolve) => {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
    audio.play().catch(() => resolve());
  });
}

// ── Hangup ──
async function hangup() {
  stopTimer();
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  document.getElementById('ended-timer').textContent = timerStr();
  showPhase('ended');
  try { await api('/hangup', {}); } catch(e) { console.error(e); }
}

// ── Init ──
if (!TOKEN) {
  document.querySelector('.call-reason').textContent = '无效的通话链接';
} else {
  // Fetch call info (reason only) without marking as connected
  fetch(API_BASE + '/info', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({token: TOKEN}),
  }).then(r => r.json()).then(res => {
    if (res.ok && res.reason) {
      document.getElementById('call-reason').textContent = res.reason;
    } else {
      document.getElementById('call-reason').textContent = '来听听你声音';
    }
  }).catch(() => {
    document.getElementById('call-reason').textContent = '来听听你声音';
  });
}
</script>
</body>
</html>
